{% extends "base.html" %}

{% block title %}Forgot Password - Alumni Sync{% endblock %}

{% block content %}
<section class="section">
    <div class="container container-narrow">
        <div class="form-card" style="max-width: 500px; margin: 0 auto;">
            <div class="section-title">
                <h2>Reset Password</h2>
                <p>Enter your email structure to receive reset instructions.</p>
            </div>

            <form>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="you@example.com">
                </div>

                <button type="button" class="btn btn-primary btn-block"
                    onclick="alert('Password reset link has been sent to your email (Simulated).')">Send Reset
                    Link</button>

                <div style="text-align: center; margin-top: 1.5rem;">
                    <a href="{{ url_for('login') }}">Back to Login</a>
                </div>
            </form>
        </div>
    </div>
</section>
{% endblock %}
