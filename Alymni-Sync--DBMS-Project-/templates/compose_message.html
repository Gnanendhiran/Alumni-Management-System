{% extends "base.html" %}

{% block title %}Compose Message - Alumni Sync{% endblock %}

{% block content %}
<section class="page-header">
    <div class="container">
        <a href="{{ url_for('messages_inbox') }}" class="back-link">← Back to Messages</a>
    </div>
</section>

<section class="section">
    <div class="container">
        <div class="form-container" style="max-width: 700px; margin: 0 auto;">
            <h1>New Message</h1>
            <p style="margin-bottom: 2rem; color: var(--gray-600);">Send a message to {{ recipient.first_name }} {{
                recipient.last_name }}</p>

            <form method="POST">
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="8" required
                        placeholder="Type your message here..."></textarea>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Send Message</button>
                    <a href="{{ url_for('messages_inbox') }}" class="btn btn-outline">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</section>
{% endblock %}
